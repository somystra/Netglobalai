<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGlobal AI</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container {
            width: 380px; height: 550px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .header { padding: 15px; text-align: center; color: #fff; background: rgba(0,0,0,0.2); }
        #chat { flex: 1; padding: 15px; overflow-y: auto; color: #fff; font-size: 14px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .u { background: #6a11cb; align-self: flex-end; margin-left: auto; }
        .b { background: #2575fc; align-self: flex-start; }
        .input-box { display: flex; padding: 15px; gap: 10px; }
        input { flex: 1; border: none; border-radius: 5px; padding: 10px; outline: none; }
        button { background: #6a11cb; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h3>NetGlobal AI</h3>
        <small>Solijon, Ulug'bek, Dilmurod</small>
    </div>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="inp" placeholder="Savol yozing...">
        <button onclick="send()">Yuborish</button>
    </div>
</div>
<script>
    async function send() {
        const i = document.getElementById('inp');
        const c = document.getElementById('chat');
        if(!i.value) return;
        c.innerHTML += `<div class="msg u">${i.value}</div>`;
        const res = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: i.value})
        });
        const d = await res.json();
        c.innerHTML += `<div class="msg b">${d.reply}</div>`;
        i.value = '';
        c.scrollTop = c.scrollHeight;
    }
</script>
</body>
</html>
